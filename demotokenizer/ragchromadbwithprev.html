<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CBOW Visualizer - Document Query App</title>
<style>
  /* === WEBTVMEDIA.NET Brand CSS (adapted) === */
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Segoe UI", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f5f7fa;
    color: #2d3748;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 2rem; background-color: #6a1b9a; color: #fff;
    flex-wrap: wrap; box-shadow: 0 2px 8px rgba(0,83,159,0.08);
  }
  header img {
    flex-shrink: 0; height: 40px; margin-right: 1rem; cursor: pointer; user-select: none;
  }
  label {
    font-weight: 600; color: #a0aec0; margin-bottom: 0.5rem; display: inline-block;
  }
  textarea {
    width: 100%; height: 100px; resize: vertical;
    font-family: "Courier New", Courier, monospace;
    font-size: 1rem; padding: 0.5rem; border-radius: 4px;
    border: 1px solid #a0aec0; background-color: #fff; color: #2d3748;
    transition: border-color 0.3s;
  }
  textarea:focus {
    border-color: #ab47bc; outline: none;
  }
  input[type="file"], button, input[type="number"], input[type="text"], select {
    background-color: #8e24aa; border: none; color: #fff;
    padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;
    font-weight: 600; font-size: 1rem; transition: background-color 0.3s;
    margin-bottom: 0.5rem;
    font-family: "Segoe UI", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

  input[type="file"]:hover, button:hover:not(:disabled), input[type="number"]:hover, input[type="text"]:hover, select:hover {
    background-color: #ab47bc;
  }
  input[type="number"] {
    width: 80px;
    margin-left: 0.5rem;
    margin-right: 1rem;
  }
  input[type="text"], select {
    width: 100%;
    box-sizing: border-box;
  }
  button:disabled {

  main {
    flex: 1; display: flex; flex-direction: row; overflow: hidden; background-color: #fff;

  #text-display {
    flex: 1; padding: 2rem;
    font-family: "Courier New", Courier, monospace;

  .token {

  .token.target {
    border: 2px solid #ffeb3b; font-weight: 700; background-color: #fffbe6;

  .token.context {
    border: 2px solid #ab47bc; background-color: #fce4ec;

  #info-panel {
    width: 360px; background-color: #f0f4f8; padding: 1.5rem;
    border-left: 1px solid #cbd5e0; font-size: 0.95rem; color: #2d3748; overflow-y: auto;
  }
  #info-panel h2, #info-panel h3 {
    color: #6a1b9a; font-weight: 700; margin-top: 0; margin-bottom: 0.5rem;
  }
  #cbow-output {
    background: #6a1b9a; color: #fff; padding: 1rem; border-radius: 4px;
    font-family: "Courier New", Courier, monospace; font-size: 0.95rem;
    margin-top: 1rem; white-space: pre-wrap; max-height: 150px; overflow-y: auto;
  }
  button:focus, textarea:focus, input[type="number"]:focus, input[type="text"]:focus, select:focus {
    outline: 2px solid #ffeb3b; outline-offset: 2px;

  footer[role="contentinfo"] {

  table {

  th {

  }
  /* Scroll container for embedding matrix */
  #embedding-matrix {
    max-height: 300px;

    overflow-y: auto;

  /* Adapted layout for your app */
  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }
  .left, .right {
    width: 50%;

  }

    border-right: 1px solid #cbd5e0;
    display: flex;
    flex-direction: column;
  }
  .right {
    display: flex;
    flex-direction: column;
  }
  #notification {
    padding: 0.75rem 1rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    font-weight: 600;
    display: none;
  }
  #notification.success {
    background-color: #d4edda;
    border: 1px solid #c3e6cb;
    color: #155724;
  }
  #notification.error {
    background-color: #f8d7da;
    border: 1px solid #f5c6cb;
    color: #721c24;
  }
  #notification.warning {
    background-color: #fff3cd;
    border: 1px solid #ffeaa7;
    color: #856404;
  }
  #notification.info {
    background-color: #d1ecf1;
    border: 1px solid #bee5eb;
    color: #0c5460;
  }
  #file_info {
    background-color: #f8f9fa;
    border: 1px solid #e9ecef;

    padding: 8px;

  .progress-bar {
    width: 100%;

  #processing {

  #doc_list {

    margin-bottom: 1rem;
  }
  #log_frame {
    position: fixed;
    top: 50%;

    width: 600px;

    background: #fff;
    border: 1px solid #6a1b9a;
    padding: 1rem;
    display: none;
    z-index: 1000;
    box-shadow: 0 4px 12px rgba(0, 51, 102, 0.3);
    border-radius: 6px;
  }
  #log_text {
    width: 100%;
    height: 320px;
    box-sizing: border-box;
    font-family: monospace;
    font-size: 0.9rem;
    border: 1px solid #a0aec0;
    border-radius: 4px;
    padding: 0.5rem;
    background-color: #f9fafb;

  }
  #close_log {
    margin-top: 0.5rem;
    background-color: #8e24aa;
    border: none;
    color: #fff;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    transition: background-color 0.3s;
  }
  #close_log:hover {
    background-color: #ab47bc;
  }
</style>

<body>
<!-- External libraries -->
<script src="./libs/pdfjs/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

// Configure transformers.js to prefer local assets.
env.allowRemoteModels = false;
env.allowLocalModels = true;
env.localModelPath = './models';
env.environment = 'browser';

// Wait for pdfjsLib to be loaded
function waitForPdfjs() {
  return new Promise((resolve) => {
    if (window.pdfjsLib) {
      resolve(window.pdfjsLib);
    } else {
      const interval = setInterval(() => {
        if (window.pdfjsLib) {
          clearInterval(interval);
          resolve(window.pdfjsLib);
        }
      }, 50);
    }
  });
}

(async () => {
  const pdfjsLib = await waitForPdfjs();
  pdfjsLib.GlobalWorkerOptions.workerSrc = './libs/pdfjs/pdf.worker.min.js';

  // Logs
  let logs = [];
  function log_info(msg) {
    logs.push(msg);
    console.log(msg);
  }

  // Notification system
  function showNotification(message, type = 'info', duration = 5000) {
    const notification = document.getElementById('notification');
    notification.textContent = message;
    notification.className = `notification ${type}`;
    notification.style.display = 'block';

    if (duration > 0) {
      setTimeout(() => {
        notification.style.display = 'none';
      }, duration);
    }

    log_info(`[${type.toUpperCase()}] ${message}`);
  }

  function updateProgress(percentage, message = '') {
    const progressBar = document.getElementById('upload_progress');
    const progressFill = document.getElementById('upload_progress_fill');

    if (percentage > 0) {
      progressBar.style.display = 'block';
      progressFill.style.width = `${percentage}%`;
    } else {
      progressBar.style.display = 'none';
    }

    if (message) {
      document.getElementById('status').innerText = message;
    }
  }

  function showFileInfo(files) {
    const fileInfo = document.getElementById('file_info');
    fileInfo.innerHTML = '';

    if (files.length === 0) {
      fileInfo.innerHTML = '<div class="file-info">No files selected</div>';
      return;
    }

    files.forEach(file => {
      const fileDiv = document.createElement('div');
      fileDiv.className = 'file-info';
      fileDiv.innerHTML = `
        <strong>${file.name}</strong> 
        (${(file.size / 1024 / 1024).toFixed(2)} MB)
        <br><small>Type: ${file.type || 'Unknown'}</small>
      `;
      fileInfo.appendChild(fileDiv);
    });
  }

  const apiUrlInput = document.getElementById('url');
  const detectPortBtn = document.getElementById('detect-port-btn');
  const statusElement = document.getElementById('status');

  const OLLAMA_PORT_CANDIDATES = [11434, 11435, 11436, 5000, 8000];
  const OLLAMA_HOST_CANDIDATES = ['http://127.0.0.1', 'http://localhost'];

  async function pingOllama(baseUrl, timeout = 1200) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      const response = await fetch(`${baseUrl}/api/version`, {signal: controller.signal});
      clearTimeout(timer);
      return response.ok;
    } catch (err) {
      clearTimeout(timer);
      return false;
    }
  }

  async function detectOllamaPort(options = {}) {
    if (!detectPortBtn || !apiUrlInput) { return null; }

    const { silent = false } = options;
    if (!silent) {
      detectPortBtn.disabled = true;
      showNotification('Detecting Ollama service…', 'info', 0);
      if (statusElement) {
        statusElement.innerText = 'Detecting Ollama service…';
      }
    }

    const savedBase = localStorage.getItem('ollama.base');
    if (savedBase) {
      const normalized = savedBase.replace(/\/$/, '');
      if (await pingOllama(normalized)) {
        apiUrlInput.value = `${normalized}/api/chat`;
        if (!silent) {
          showNotification(`Using saved Ollama endpoint at ${normalized}`, 'success', 4000);
          if (statusElement) {
            statusElement.innerText = `Ollama endpoint: ${normalized}`;
          }
          detectPortBtn.disabled = false;
        }
        return normalized;
      }
    }

    for (const port of OLLAMA_PORT_CANDIDATES) {
      for (const host of OLLAMA_HOST_CANDIDATES) {
        const base = `${host}:${port}`;
        if (await pingOllama(base)) {
          apiUrlInput.value = `${base}/api/chat`;
          localStorage.setItem('ollama.base', base);
          if (!silent) {
            showNotification(`Detected Ollama at ${base}`, 'success', 4000);
            if (statusElement) {
              statusElement.innerText = `Ollama detected at ${base}`;
            }
            detectPortBtn.disabled = false;
          }
          return base;
        }
      }
    }

    if (!silent) {
      showNotification('No Ollama endpoint detected on common ports. Start Ollama or set the API URL manually.', 'warning', 6000);
      if (statusElement) {
        statusElement.innerText = 'Ollama endpoint not detected.';
      }
      detectPortBtn.disabled = false;
    }
    return null;
  }

  // Base Document Class
  class DocumentClass {
    constructor(file) {
      this.file = file;
      this.file_name = file.name;
      this.file_ext = '.' + file.name.split('.').pop().toLowerCase();
    }
    async extract_text() {
      throw new Error('Not implemented');
    }
  }

  // Document Handlers with error handling
  class PDFDocument extends DocumentClass {
    async extract_text() {
      try {
        log_info(`Extracting text from PDF: ${this.file_name}`);
        const arrayBuffer = await this.file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let text_pages = [];

        for (let i = 1; i <= pdf.numPages; i++) {
          updateProgress((i / pdf.numPages) * 50, `Processing PDF page ${i}/${pdf.numPages}`);
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const text = content.items.map(item => item.str).join(' ');
          if (text.trim()) text_pages.push(text);
        }

        if (text_pages.length === 0) {
          log_info('No text found in PDF, trying OCR...');
          return await this.extract_text_with_ocr();
        }

        const metadatas = text_pages.map((_, i) => ({page_number: i+1}));
        log_info(`PDF extraction successful: ${text_pages.length} pages`);
        return [text_pages, metadatas];
      } catch (e) {
        log_info(`PDF extraction failed: ${e.message}`);
        console.error(e);
        showNotification(`Error processing PDF ${this.file_name}: ${e.message}`, 'error');
        return await this.extract_text_with_ocr();
      }
    }

    async extract_text_with_ocr() {
      try {
        log_info(`Starting OCR for PDF: ${this.file_name}`);
        const arrayBuffer = await this.file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let text_pages = [];

        for (let i = 1; i <= pdf.numPages; i++) {
          updateProgress(50 + (i / pdf.numPages) * 50, `OCR processing page ${i}/${pdf.numPages}`);
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({scale: 1.5});
          const canvas = document.createElement('canvas');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          const ctx = canvas.getContext('2d');
          await page.render({canvasContext: ctx, viewport}).promise;
          const { data } = await Tesseract.recognize(canvas.toDataURL(), 'eng');
          const text = data.text.trim();
          if (text) text_pages.push(text);
        }

        const metadatas = text_pages.map((_, i) => ({page_number: i+1}));
        log_info(`OCR successful: ${text_pages.length} pages`);
        return [text_pages, metadatas];
      } catch (e) {
        log_info(`OCR failed: ${e.message}`);
        console.error(e);
        showNotification(`OCR failed for ${this.file_name}: ${e.message}`, 'error');
        return [[], []];
      }
    }
  }

  class ExcelDocument extends DocumentClass {
    async extract_text() {
      try {
        log_info(`Extracting data from Excel: ${this.file_name}`);
        const arrayBuffer = await this.file.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, {type: 'array'});
        let documents = [];
        let metadatas = [];

        workbook.SheetNames.forEach((sheet_name, sheetIndex) => {
          updateProgress((sheetIndex / workbook.SheetNames.length) * 100, `Processing sheet ${sheet_name}`);
          const worksheet = workbook.Sheets[sheet_name];
          const json = XLSX.utils.sheet_to_json(worksheet, {header:1});
          json.forEach((row, row_idx) => {
            const row_text = row.filter(v => v != null).join(' ');
            if (row_text.trim()) {
              documents.push(row_text);
              metadatas.push({sheet_name, row_index: row_idx});
            }
          });
        });

        log_info(`Excel extraction successful: ${documents.length} rows`);
        return [documents, metadatas];
      } catch (e) {
        log_info(`Excel extraction failed: ${e.message}`);
        console.error(e);
        showNotification(`Error processing Excel file ${this.file_name}: ${e.message}`, 'error');
        return [[], []];
      }
    }
  }

  class WordDocument extends DocumentClass {
    async extract_text() {
      try {
        log_info(`Extracting text from Word document: ${this.file_name}`);
        const arrayBuffer = await this.file.arrayBuffer();
        const result = await mammoth.extractRawText({arrayBuffer});
        const text_paragraphs = result.value.split(/\n+/).filter(t => t.trim());
        const metadatas = text_paragraphs.map((_, i) => ({paragraph_index: i+1}));

        log_info(`Word extraction successful: ${text_paragraphs.length} paragraphs`);
        return [text_paragraphs, metadatas];
      } catch (e) {
        log_info(`Word extraction failed: ${e.message}`);
        console.error(e);
        showNotification(`Error processing Word document ${this.file_name}: ${e.message}`, 'error');
        return [[], []];
      }
    }
  }

  class ImageDocument extends DocumentClass {
    async extract_text() {
      try {
        log_info(`Performing OCR on image: ${this.file_name}`);
        const url = URL.createObjectURL(this.file);
        const { data } = await Tesseract.recognize(url, 'eng');
        URL.revokeObjectURL(url);
        const text = data.text.trim();

        if (text) {
          log_info(`Image OCR successful`);
          return [[text], [{image_index: 1}]];
        } else {
          log_info(`No text found in image`);
          showNotification(`No text found in image ${this.file_name}`, 'warning');
          return [[], []];
        }
      } catch (e) {
        log_info(`Image OCR failed: ${e.message}`);
        console.error(e);
        showNotification(`Error processing image ${this.file_name}: ${e.message}`, 'error');
        return [[], []];
      }
    }
  }

  class AudioDocument extends DocumentClass {
    async extract_text() {
      try {
        log_info(`Transcribing audio: ${this.file_name}`);
        const transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en');
        const arrayBuffer = await this.file.arrayBuffer();
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const input = audioBuffer.getChannelData(0);
        const result = await transcriber(input, {chunk_length_s: 30, stride_length_s: 5});
        audioContext.close();
        const text = result.text.trim();

        if (text) {
          log_info(`Audio transcription successful`);
          return [[text], [{audio_index: 1}]];
        } else {
          log_info(`No speech detected in audio`);
          showNotification(`No speech detected in audio file ${this.file_name}`, 'warning');
          return [[], []];
        }
      } catch (e) {
        log_info(`Audio transcription failed: ${e.message}`);
        console.error(e);
        showNotification(`Error processing audio file ${this.file_name}: ${e.message}`, 'error');
        return [[], []];
      }
    }
  }

  // Document type mapping
  const DOCUMENT_TYPES = {
    '.pdf': PDFDocument,
    '.xlsx': ExcelDocument,
    '.xls': ExcelDocument,
    '.docx': WordDocument,
    '.png': ImageDocument,
    '.jpg': ImageDocument,
    '.jpeg': ImageDocument,
    '.wav': AudioDocument
  };

  const SUPPORTED_TYPES = Object.keys(DOCUMENT_TYPES).join(',');

  // Embedding model
  let embed_model;
  async function load_embed_model() {
    if (!embed_model) {
      log_info('Loading embedding model...');
      try {
        embed_model = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        log_info('Embedding model loaded');
      } catch (err) {
        console.error(err);
        const guidance = 'Missing local model files. Place the contents of "Xenova/all-MiniLM-L6-v2" under ./models/ before retrying.';
        log_info(guidance);
        showNotification(guidance, 'error', 8000);
        throw err;
      }
    }
    return embed_model;
  }

  async function embed_texts(texts) {
    if (texts.length === 0) return [];
    const model = await load_embed_model();
    const results = await Promise.all(texts.map(t => model(t, {pooling: 'mean', normalize: true})));
    return results.map(r => Array.from(r.data));
  }

  // Collection class
  class Collection {
    constructor() {
      this.documents = [];
      this.embeddings = [];
      this.metadatas = [];
      this.ids = [];
    }

    add({documents, metadatas, ids, embeddings}) {
      this.documents = this.documents.concat(documents);
      this.embeddings = this.embeddings.concat(embeddings);
      this.metadatas = this.metadatas.concat(metadatas);
      this.ids = this.ids.concat(ids);
    }

    get({ids = null, include = ['documents', 'metadatas']}) {
      if (!ids) {
        ids = this.ids;
      }
      const indices = ids.map(id => this.ids.indexOf(id)).filter(i => i !== -1);
      const result = {ids: indices.map(i => this.ids[i])};
      if (include.includes('documents')) {
        result.documents = indices.map(i => this.documents[i]);
      }
      if (include.includes('metadatas')) {
        result.metadatas = indices.map(i => this.metadatas[i]);
      }
      return result;
    }

    async query({query_texts, n_results}) {
      if (this.embeddings.length === 0) return {documents: [[]]};
      const q_embs = await embed_texts(query_texts);
      const query = q_embs[0];
      const scores = this.embeddings.map(emb => this.cosineSimilarity(query, emb));
      const sortedIndices = scores
        .map((s, i) => ({s, i}))
        .sort((a, b) => b.s - a.s)
        .slice(0, n_results)
        .map(({i}) => i);
      return {
        documents: [sortedIndices.map(i => this.documents[i])]
      };
    }

    cosineSimilarity(a, b) {
      const dot = a.reduce((sum, ai, i) => sum + ai * b[i], 0);
      const normA = Math.sqrt(a.reduce((sum, ai) => sum + ai * ai, 0));
      const normB = Math.sqrt(b.reduce((sum, bi) => sum + bi * bi, 0));
      return normA && normB ? dot / (normA * normB) : 0;
    }

    delete({ids}) {
      const indices = ids.map(id => this.ids.indexOf(id)).filter(i => i !== -1).sort((a, b) => b - a);
      indices.forEach(i => {
        this.documents.splice(i, 1);
        this.embeddings.splice(i, 1);
        this.metadatas.splice(i, 1);
        this.ids.splice(i, 1);
      });
    }
  }

  // Initialize collection
  let collection = new Collection();

  // Add documents to collection
  async function add_documents_to_chroma(documents, collection, source_file, metadatas, batch_size = 100) {
    if (!documents.length) return;
    for (let i = 0; i < documents.length; i += batch_size) {
      const batch_docs = documents.slice(i, i + batch_size);
      const batch_metas = metadatas.slice(i, i + batch_size);
      const batch_ids = batch_docs.map((_, j) => `${source_file}_${i + j}_${crypto.randomUUID().slice(0, 8)}`);
      batch_metas.forEach((metadata, k) => {
        metadata.source = source_file;
        metadata.file_type = source_file.split('.').pop().toLowerCase();
        metadata.chunk_index = i + k;
        metadata.hierarchy = `${source_file}/${metadata.sheet_name || metadata.page_number || metadata.paragraph_index || metadata.image_index || metadata.audio_index || 'unknown'}/${metadata.row_index || 'unknown'}`;
      });
      const embeddings = await embed_texts(batch_docs);
      collection.add({
        documents: batch_docs,
        metadatas: batch_metas,
        ids: batch_ids,
        embeddings
      });
    }
    log_info(`Added ${documents.length} documents from ${source_file} to collection.`);
  }

  // List documents
  function list_documents() {
    const results = collection.get({include: ['documents', 'metadatas']});
    return results.ids.map((id, idx) => ({
      id,
      content: (results.documents[idx] || '').slice(0, 200) + ((results.documents[idx] || '').length > 200 ? '...' : ''),
      source: (results.metadatas[idx]?.source || 'unknown'),
      page_number: results.metadatas[idx]?.page_number || 'unknown',
      sheet_name: results.metadatas[idx]?.sheet_name || 'unknown',
      row_index: results.metadatas[idx]?.row_index || 'unknown',
      paragraph_index: results.metadatas[idx]?.paragraph_index || 'unknown',
      image_index: results.metadatas[idx]?.image_index || 'unknown',
      audio_index: results.metadatas[idx]?.audio_index || 'unknown',
      chunk_index: results.metadatas[idx]?.chunk_index || 'unknown'
    }));
  }

  // Web search
  async function search_web(query, max_results = 3) {
    try {
      const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1`);
      const data = await response.json();
      const results = (data.RelatedTopics || []).slice(0, max_results).map(t => `${t.Text || ''} - ${t.FirstURL || ''}`);
      return results.join('\n\n');
    } catch (e) {
      console.error(e);
      return '';
    }
  }

  // Merge context
  async function smart_mcp_merge(collection, user_query, selected_doc_ids = null, use_web = true, web_first = false) {
    let top_docs = [];
    if (selected_doc_ids?.length) {
      const results = collection.get({ids: selected_doc_ids, include: ['documents']});
      top_docs = results.documents || [];
    } else {
      const results = await collection.query({query_texts: [user_query], n_results: 4});
      top_docs = results.documents[0] || [];
    }
    const local_context = top_docs.join('\n\n');
    const web_context = use_web ? await search_web(user_query) : '';
    if (web_first) {
      return `[WEB]\n${web_context}\n\n[LOCAL]\n${local_context}`;
    } else {
      return `[LOCAL]\n${local_context}\n\n[WEB]\n${web_context}`;
    }
  }

  // Fetch LLM response (Ollama-compatible)
  async function fetch_chatgpt_response(url, headers, payload, timeout = 10) {
    try {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout * 1000);
      const response = await fetch(url, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload),
        signal: controller.signal
      });
      clearTimeout(id);
      if (!response.ok) {
        return `API HTTP error: ${response.status} - ${await response.text()}`;
      }

      // Handle streaming (Ollama format)
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let full_content = '';
      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          chunk.split('\n').forEach(line => {
            if (line.trim() && line.startsWith('data: ')) {
              try {
                const json_data = JSON.parse(line.slice(6));
                if (json_data.message?.content) {
                  full_content += json_data.message.content;
                }
              } catch (e) {
                console.warn('Failed to parse line:', line);
              }
            }
          });
        }
      } catch (e) {
        if (e.name !== 'AbortError') throw e;
      }
      return full_content.trim();
    } catch (e) {
      return `Error: ${e.message}`;
    }
  }

  // Validate model name
  function validate_model_name(model_name) {
    if (!model_name) return false;
    const pattern = /^[a-zA-Z0-9][a-zA-Z0-9-_.]*[a-zA-Z0-9]$/;
    if (model_name.length > 96 || model_name.includes('--') || model_name.includes('..')) {
      return false;
    }
    return pattern.test(model_name);
  }

  // Hugging Face query
  async function query_with_huggingface(context, query, model_name = 'Qwen/Qwen2-0.5B-Instruct') {
    const modelName = model_name.split('/').pop();
    if (!validate_model_name(modelName)) {
      return `Error: Invalid model name '${model_name}'.`;
    }
    const prompt = `You are a helpful assistant. Use the following context to answer the question.\n\nContext: ${context}\n\nQuestion: ${query}\nAnswer:`;
    try {
      const generator = await pipeline('text-generation', `Xenova/${modelName}`);
      const response = await generator(prompt, {
        max_new_tokens: 150,
        temperature: 0.7,
        do_sample: true,
        truncation: true
      });
      let answer = response[0].generated_text.trim();
      if (answer.startsWith(prompt)) {
        answer = answer.slice(prompt.length).trim();
      }
      return answer;
    } catch (e) {
      return `Error: ${e.message}`;
    }
  }

  // Validate file
  function validate_file(file) {
    const max_size = 100 * 1024 * 1024; // 100MB
    const allowed_extensions = Object.keys(DOCUMENT_TYPES);
    const file_ext = '.' + file.name.split('.').pop().toLowerCase();

    if (file.size > max_size) {
      return [false, `File size (${(file.size / 1024 / 1024).toFixed(2)} MB) exceeds 100MB limit.`];
    }

    if (!allowed_extensions.includes(file_ext)) {
      return [false, `File type ${file_ext} is not supported. Supported types: ${SUPPORTED_TYPES}`];
    }

    return [true, ''];
  }

  // Process and query
  async function process_and_query(files, user_query, selected_doc_ids, user_url, model_name, api_key, use_web, timeout) {
    if (!files.length && !selected_doc_ids.length && collection.ids.length === 0) {
      return ['No files uploaded or documents selected.', '', ''];
    }

    let status_messages = [];
    let processed_count = 0;
    let error_count = 0;

    for (let file of files) {
      const [is_valid, msg] = validate_file(file);
      if (!is_valid) {
        status_messages.push(`Error with ${file.name}: ${msg}`);
        error_count++;
        continue;
      }

      const file_ext = '.' + file.name.split('.').pop().toLowerCase();
      if (!(file_ext in DOCUMENT_TYPES)) {
        status_messages.push(`Unsupported file type: ${file_ext} for ${file.name}`);
        error_count++;
        continue;
      }

      const DocClass = DOCUMENT_TYPES[file_ext];
      const doc_handler = new DocClass(file);

      try {
        updateProgress(0, `Processing ${file.name}...`);
        const [docs, metadatas] = await doc_handler.extract_text();
        if (docs.length) {
          await add_documents_to_chroma(docs, collection, file.name, metadatas);
          status_messages.push(`✓ Processed ${file.name}: ${docs.length} chunks`);
          processed_count++;
        } else {
          status_messages.push(`⚠ No text extracted from ${file.name}`);
          error_count++;
        }
      } catch (e) {
        status_messages.push(`✗ Error processing ${file.name}: ${e.message}`);
        error_count++;
      }
    }

    updateProgress(0, ''); // Hide progress bar

    if (processed_count === 0 && error_count > 0) {
      return ['All files failed to process. Please check file formats and try again.', '', ''];
    }

    if (status_messages.length === 0 && selected_doc_ids.length === 0 && collection.ids.length === 0) {
      return ['No readable text found in uploaded files.', '', ''];
    }

    const context = await smart_mcp_merge(collection, user_query, selected_doc_ids, use_web);
    let answer;

    if (model_name.includes(':')) {
      const headers = {'Content-Type': 'application/json'};
      if (api_key) headers['Authorization'] = `Bearer ${api_key}`;
      const payload = {
        model: model_name,
        messages: [
          {role: 'system', content: 'You are a helpful assistant.'},
          {role: 'user', content: `Context: ${context}\n\nQuestion: ${user_query}`}
        ],
        stream: true
      };
      answer = await fetch_chatgpt_response(user_url, headers, payload, timeout);
    } else {
      answer = await query_with_huggingface(context, user_query, model_name);
    }

    const summary = processed_count > 0 ?
      `Processed ${processed_count} file(s) successfully${error_count > 0 ? `, ${error_count} failed` : ''}. ${answer ? 'Query executed.' : 'Query failed.'}` :
      'Query executed using existing documents.';

    return [summary, answer, context];
  }

  // Reset collection
  function reset_collection() {
    collection = new Collection();
    return [true, 'Database reset successfully!'];
  }

  // KaTeX rendering
  function process_and_insert(text) {
    const container = document.getElementById('answer');
    container.innerHTML = '';

    const regex = /(\$\$([\s\S]*?)\$\$|\$([^\$]*?)\$)/g;
    let lastIndex = 0;
    let match;

    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIndex) {
        const plainText = text.slice(lastIndex, match.index);
        container.appendChild(document.createTextNode(plainText));
      }

      const isDisplay = match[1].startsWith('$$');
      const tex = isDisplay ? match[2] : match[3];

      const span = document.createElement('span');
      try {
        katex.render(tex, span, {
          throwOnError: false,
          displayMode: isDisplay
        });
      } catch {
        span.textContent = isDisplay ? `$$${tex}$$` : `$${tex}$`;
      }
      container.appendChild(span);

      lastIndex = match.index + match[0].length;
    }

    if (lastIndex < text.length) {
      container.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
  }

  // App state
  let file_paths = [];
  let recent_files = [];
  let docs = [];

  // Event listeners
  document.getElementById('upload').addEventListener('click', () => {
    const uploadBtn = document.getElementById('upload');
    uploadBtn.disabled = true;

    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.accept = Object.keys(DOCUMENT_TYPES).join(',');
    document.body.appendChild(input);

    input.style.position = 'fixed';
    input.style.left = '-9999px';
    input.style.width = '1px';
    input.style.height = '1px';
    input.style.opacity = '0';
    input.style.pointerEvents = 'none';

    input.click();

    input.addEventListener('change', () => {
      if (input.files.length > 0) {
        file_paths = Array.from(input.files);
        recent_files = file_paths.map(f => f.name);

        let valid_files = [];
        let invalid_files = [];

        file_paths.forEach(file => {
          const [is_valid, msg] = validate_file(file);
          if (is_valid) {
            valid_files.push(file);
          } else {
            invalid_files.push({name: file.name, error: msg});
          }
        });

        if (valid_files.length > 0) {
          showNotification(`Successfully selected ${valid_files.length} file(s)`, 'success', 3000);
          showFileInfo(valid_files);
          document.getElementById('status').innerText = `Selected ${valid_files.length} valid file(s). Click "Run Query" to process.`;

          if (invalid_files.length > 0) {
            showNotification(`${invalid_files.length} file(s) were invalid and ignored`, 'warning', 5000);
            invalid_files.forEach(file => {
              log_info(`Invalid file: ${file.name} - ${file.error}`);
            });
          }

          file_paths = valid_files;
          refresh_docs();
        } else {
          showNotification('No valid files selected. Please check file types and sizes.', 'error', 5000);
          showFileInfo([]);
          document.getElementById('status').innerText = 'No valid files selected.';
        }
      } else {
        showNotification('File selection cancelled', 'info', 2000);
        document.getElementById('status').innerText = 'File selection cancelled.';
      }

      document.body.removeChild(input);
      uploadBtn.disabled = false;
    }, { once: true });
  });

  document.getElementById('clear').addEventListener('click', () => {
    document.getElementById('query').value = '';
    document.getElementById('url').value = 'http://localhost:11434/api/chat';
    document.getElementById('model').value = 'qwen3:14b';
    document.getElementById('key').value = '';
    document.getElementById('timeout').value = '500';
    document.getElementById('use_web').checked = false;
    document.getElementById('answer').innerHTML = '';
    document.getElementById('status').innerText = '';
    document.getElementById('doc_list').selectedIndex = -1;
    showNotification('Form cleared', 'info', 2000);
  });

  document.getElementById('display_mode').addEventListener('change', refresh_docs);

  document.getElementById('doc_list').addEventListener('change', () => {
    const selectedOptions = document.getElementById('doc_list').selectedOptions;
    if (selectedOptions.length > 0) {
      const index = selectedOptions[0].index;
      const doc = docs[index];
      document.getElementById('preview').value = `Source: ${doc.source}\n\nContent:\n${doc.content}`;
    } else {
      document.getElementById('preview').value = '';
    }
  });

  document.getElementById('logs').addEventListener('click', () => {
    document.getElementById('log_text').value = logs.join('\n');
    document.getElementById('log_frame').style.display = 'block';
  });

  document.getElementById('close_log').addEventListener('click', () => {
    document.getElementById('log_frame').style.display = 'none';
  });

  if (detectPortBtn) {
    detectPortBtn.addEventListener('click', () => {
      detectOllamaPort().catch(err => console.error('Port detection failed', err));
    });
  }

  document.getElementById('run').addEventListener('click', async () => {
    const query = document.getElementById('query').value.trim();
    const url = document.getElementById('url').value.trim();
    const model = document.getElementById('model').value.trim();
    const key = document.getElementById('key').value.trim();
    const timeout = parseFloat(document.getElementById('timeout').value) || 500;
    const use_web = document.getElementById('use_web').checked;
    const selected_doc_ids = Array.from(document.getElementById('doc_list').selectedOptions).map(opt => docs[opt.index]?.id).filter(id => id);

    if (!query) {
      showNotification('Please enter a query.', 'error', 3000);
      return;
    }

    if (!file_paths.length && collection.ids.length === 0 && selected_doc_ids.length === 0) {
      showNotification('No documents in database or selected. Please upload at least one file or select documents.', 'error', 5000);
      return;
    }

    document.getElementById('processing').style.display = 'block';
    document.getElementById('status').innerText = `Processing ${file_paths.length} files...`;
    document.getElementById('run').disabled = true;

    try {
      showNotification('Processing files and running query...', 'info', 0);
      const [status, answer, context] = await process_and_query(file_paths, query, selected_doc_ids, url, model, key, use_web, timeout);

      document.getElementById('status').innerText = status;
      document.getElementById('result').value = context;

      if (answer && !answer.startsWith('Error:')) {
        process_and_insert(answer);
        showNotification('Query completed successfully!', 'success', 3000);
      } else {
        document.getElementById('answer').innerText = answer;
        showNotification('Query completed with errors', 'warning', 5000);
      }

      refresh_docs();
      file_paths = [];
      recent_files = [];
      showFileInfo([]);

    } catch (e) {
      console.error(e);
      const errorMsg = `Processing failed: ${e.message}`;
      document.getElementById('status').innerText = errorMsg;
      showNotification(errorMsg, 'error', 5000);
    } finally {
      document.getElementById('processing').style.display = 'none';
      document.getElementById('run').disabled = false;
      document.getElementById('notification').style.display = 'none';
    }
  });

  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('Are you sure you want to reset the database? All uploaded documents will be lost.')) {
      const [success, message] = reset_collection();
      showNotification(message, 'success', 3000);
      refresh_docs();
    }
  });

  function refresh_docs() {
    docs = list_documents();
    const doc_list = document.getElementById('doc_list');
    doc_list.innerHTML = '';
    const mode = document.getElementById('display_mode').value;

    docs.forEach((doc, idx) => {
      if (mode === 'Only Loaded Documents' && !recent_files.includes(doc.source)) return;

      let index = 'unknown';
      if (doc.sheet_name !== 'unknown') index = doc.sheet_name;
      else if (doc.page_number !== 'unknown') index = `p.${doc.page_number}`;
      else if (doc.paragraph_index !== 'unknown') index = `para.${doc.paragraph_index}`;
      else if (doc.image_index !== 'unknown') index = `img.${doc.image_index}`;
      else if (doc.audio_index !== 'unknown') index = `audio.${doc.audio_index}`;
      else if (doc.row_index !== 'unknown') index = `row.${doc.row_index}`;

      const option = document.createElement('option');
      option.text = `${doc.id}: ${doc.source} (${index})`;
      option.value = idx;
      doc_list.add(option);
    });
    document.getElementById('preview').value = '';
  }

  // Initial setup
  showFileInfo([]);
  refresh_docs();
  const savedOllamaBase = localStorage.getItem('ollama.base');
  if (savedOllamaBase && apiUrlInput) {
    apiUrlInput.value = `${savedOllamaBase.replace(/\/$/, '')}/api/chat`;
  } else {
    detectOllamaPort({silent: true}).catch(err => console.warn('Silent Ollama detection failed', err));
  }
  showNotification('Application loaded successfully. Click "Upload Files" to begin.', 'info', 5000);
})();
</script>
